<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <title>Verity Interface</title>
    <style>
        :root { 
            --gradient: linear-gradient(135deg, #ff9900, #ffcc00);
            --panel-bg: rgba(255, 255, 255, 0.9);
            --accent-color: #d35400;
        }

        body { 
            margin: 0; 
            background: var(--gradient); 
            height: 100vh; 
            display: flex; 
            flex-direction: column; 
            align-items: center; 
            justify-content: center; 
            font-family: 'Segoe UI', sans-serif;
            overflow: hidden;
        }

        h1 { color: #fff; font-size: 4rem; margin-bottom: 40px; text-shadow: 0 4px 10px rgba(0,0,0,0.2); }

        /* Стиль кнопок */
        .btn {
            background: rgba(255, 255, 255, 0.2);
            border: 2px solid #fff;
            color: #fff;
            padding: 15px 40px;
            margin: 10px;
            cursor: pointer;
            font-size: 1.2rem;
            border-radius: 50px;
            transition: all 0.3s ease;
            width: 300px;
            text-transform: uppercase;
            font-weight: bold;
        }
        .btn:hover { background: #fff; color: var(--accent-color); transform: scale(1.05); }

        /* Панель для сообщений вместо alert */
        #message-panel {
            display: none;
            position: fixed;
            top: 50%; left: 50%;
            transform: translate(-50%, -50%);
            background: var(--panel-bg);
            padding: 30px;
            border-radius: 20px;
            box-shadow: 0 10px 30px rgba(0,0,0,0.3);
            text-align: center;
            width: 300px;
        }
        #message-panel button { margin-top: 20px; padding: 10px 20px; border-radius: 10px; cursor: pointer; }
    </style>
</head>
<body>

    <h1>VERITY</h1>
    
    <a href="назва_твого_файлу.zip" download>
    <button class="btn">СКАЧАТЬ</button>
</a>
    <button class="btn" onclick="showMsg('Верити не только поможет управлению ПК через голос и текст но он еще может с вами поговорить!')">О помощнике</button>
    <button class="btn" onclick="showMsg('Система настроена')">Настройки</button>

    <div id="message-panel">
        <p id="msg-text">Текст сообщения</p>
        <button onclick="hideMsg()">OK</button>
    </div>

    <script>
        function showMsg(text) {
            document.getElementById('msg-text').innerText = text;
            document.getElementById('message-panel').style.display = 'block';
        }
        function hideMsg() {
            document.getElementById('message-panel').style.display = 'none';
        }
    </script>
</body>
</html>
